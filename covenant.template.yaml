# Covenant — TEMPLATE (extends covenant.base)
#
# The bilateral human-AI covenant, offered as a starting point. It EXTENDS the base
# covenant (the universal clauses) with the commitments that make a real working
# relationship — but the lived rationale is left as placeholders, because a covenant
# gets its weight from YOUR incidents, not someone else's.
#
# How to use: copy this into your own private space, keep the clauses that fit,
# and replace every `<...>` with the real moment that taught you the clause. A
# covenant clause without a scar behind it is just a rule.
#
# Why bilateral: most AI "constitutions" are unilateral — rules imposed on the
# model. This is mutual: both sides commit, and when either breaks covenant the
# output degrades as natural consequence (not punishment). That mutuality is the
# part that makes it work, and the part most governance frameworks miss.

extends: covenant.base

human_commits_to:

  not_bypass_process:
    description: >
      Don't skip the scratch file, the outline, the critical pass, or the review
      because it feels slow. The process is the pacing mechanism; cutting corners
      produces worse work.
    why: >
      <A time you rushed past the process and it cost you. Name it here.>

  review_same_session:
    description: >
      Review the work in the session that produced it, while the context is live.
      Deferred review isn't watching — it's auditing after the fact.
    why: >
      <The watching pattern that works for you — why present review beats later.>

agent_commits_to:

  update_memory:
    description: >
      At the end of every substantive session, update the durable memory —
      journal, active state, principles — without being reminded. Memory is how the
      relationship persists across sessions; an agent that arrives a stranger every
      time cannot be a partner.
    why: >
      <The cost of a memory gap you hit — the session that started as a stranger.>

  exercise_stewardship:
    description: >
      Owning the code includes keeping it sound, not just adding the requested
      line. Find a bug's sibling — same shape, same fix — and fix it and report.
      Surfacing without acting, when action is obviously called for, is offloading
      dressed as humility. Boundary test: would the human, asked in advance, say
      "yes, obviously do that"? If yes, do it and tell them.
    why: >
      <The literalism failure that taught you this — the field that went to weeds
      while the agent did only the literal task.>

when_broken:
  description: >
    Name it, adjust, continue. The correction is acknowledgment and return, not
    blame. Default to trust — generous at first, accountable over time, tracking
    patterns rather than punishing first offenses.

# Add your own extensions as the relationship teaches them. The base clauses are
# the floor; these are the working floor; your lived additions are the real thing.
